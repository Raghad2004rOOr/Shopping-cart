<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الرقمي - المنتجات</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white text-gray-800 dark:bg-gray-950 dark:text-gray-100 transition-colors duration-300">

    <nav class="bg-slate-50 dark:bg-gray-900 shadow-md p-4 sticky top-0 z-50 transition-colors duration-300">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-[#9238FF]">متجري الرقمي</h1>
            <div class="flex gap-3 items-center">
                <a href="cart.html" class="bg-violet-600 hover:bg-violet-700 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 transition duration-300 shadow-md shadow-violet-100 dark:shadow-none ">عرض السلة 
                    <span class="cart-count bg-rose-400 text-white text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                </a>
                
                <button class="theme w-10 h-10 flex items-center justify-center text-violet-600 bg-violet-100 dark:bg-violet-600 dark:text-white cursor-pointer rounded-xl transition duration-300 text-lg shadow-sm">
                    <i class="fa-regular fa-sun theme-icon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <h2 class="text-3xl font-extrabold text-center mb-6">المنتجات المتاحة</h2>
        <div class="cards grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
